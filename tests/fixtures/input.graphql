query Foo($b: Int, $a: Boolean) {
  user(
    name: "hello"
    age: 5
    pct: 0.4
    lst: ["a", "b", "c"]
    obj: { a: "a", b: 1 }
  ) {
    ...Bar
    ... on User {
      hello
      bee
    }
    tz
    aliased: name
    withInputs(
      str: "hi"
      int: 2
      flt: 0.3
      lst: ["", "", ""]
      obj: { q: "", s: 0 }
    )
  }
}

fragment Bar on User {
  age @skip(if: $a)
  ...Nested
}

fragment Nested on User {
  blah
}
